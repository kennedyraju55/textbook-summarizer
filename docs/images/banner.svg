<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fb8500"/>
      <stop offset="100%" style="stop-color:#ffb703"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bgGrad)"/>

  <!-- Accent bar top -->
  <rect width="800" height="4" rx="2" fill="url(#accentGrad)"/>

  <!-- Accent bar bottom -->
  <rect y="196" width="800" height="4" rx="2" fill="url(#accentGrad)"/>

  <!-- Book icon -->
  <g transform="translate(80, 60)" filter="url(#glow)">
    <!-- Left page -->
    <path d="M0,10 Q0,0 10,0 L35,0 Q40,0 40,5 L40,65 Q40,70 35,70 L10,70 Q0,70 0,60 Z" fill="#fb8500" opacity="0.9"/>
    <!-- Right page -->
    <path d="M40,5 Q40,0 45,0 L70,0 Q80,0 80,10 L80,60 Q80,70 70,70 L45,70 Q40,70 40,65 Z" fill="#ffb703" opacity="0.9"/>
    <!-- Spine -->
    <rect x="38" y="0" width="4" height="70" rx="2" fill="#e8e8e8" opacity="0.3"/>
    <!-- Page lines left -->
    <line x1="8" y1="15" x2="33" y2="15" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="8" y1="25" x2="33" y2="25" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="8" y1="35" x2="33" y2="35" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="8" y1="45" x2="28" y2="45" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
    <!-- Page lines right -->
    <line x1="48" y1="15" x2="73" y2="15" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="48" y1="25" x2="73" y2="25" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="48" y1="35" x2="73" y2="35" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
    <line x1="48" y1="45" x2="68" y2="45" stroke="#1a1a2e" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="400" y="82" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#ffffff" letter-spacing="1">
    <tspan fill="#fb8500">📚</tspan> Textbook Summarizer
  </text>

  <!-- Tagline -->
  <text x="400" y="120" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#a0a0b8" letter-spacing="0.5">
    AI-Powered Chapter Summaries, Glossaries &amp; Study Guides
  </text>

  <!-- Tech badges -->
  <g transform="translate(230, 145)">
    <!-- Gemma 4 badge -->
    <rect x="0" y="0" width="80" height="24" rx="12" fill="#fb8500" opacity="0.2"/>
    <rect x="0" y="0" width="80" height="24" rx="12" fill="none" stroke="#fb8500" stroke-width="1" opacity="0.5"/>
    <text x="40" y="16" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#fb8500" font-weight="600">Gemma 4</text>

    <!-- Ollama badge -->
    <rect x="90" y="0" width="70" height="24" rx="12" fill="#fb8500" opacity="0.2"/>
    <rect x="90" y="0" width="70" height="24" rx="12" fill="none" stroke="#fb8500" stroke-width="1" opacity="0.5"/>
    <text x="125" y="16" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#fb8500" font-weight="600">Ollama</text>

    <!-- Python badge -->
    <rect x="170" y="0" width="80" height="24" rx="12" fill="#3776ab" opacity="0.2"/>
    <rect x="170" y="0" width="80" height="24" rx="12" fill="none" stroke="#3776ab" stroke-width="1" opacity="0.5"/>
    <text x="210" y="16" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#3776ab" font-weight="600">Python</text>

    <!-- Private badge -->
    <rect x="260" y="0" width="100" height="24" rx="12" fill="#2ecc71" opacity="0.2"/>
    <rect x="260" y="0" width="100" height="24" rx="12" fill="none" stroke="#2ecc71" stroke-width="1" opacity="0.5"/>
    <text x="310" y="16" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#2ecc71" font-weight="600">100% Private</text>
  </g>
</svg>
